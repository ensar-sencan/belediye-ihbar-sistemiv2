services:
  - type: web
    name: belediye-ihbar-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: belediye-ihbar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_ECHO
        value: false
      - key: CORS_ORIGINS_STR
        value: https://belediye-ihbar-sistemiv2-dmqahby5o-ensar-sencans-projects.vercel.app,https://belediye-ihbar-sistemiv2.vercel.app

databases:
  - name: belediye-ihbar-db
    databaseName: belediye_ihbar
    plan: free
