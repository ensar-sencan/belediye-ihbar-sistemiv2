services:
  db:
    image: postgres:15-alpine
    container_name: belediye_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belediye_ihbar
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: belediye_backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/belediye_ihbar
      SECRET_KEY: super-secret-key-change-in-production-min-32-chars
      JWT_SECRET_KEY: super-jwt-secret-key-change-in-production-123
      DEBUG: "false"
      DATABASE_ECHO: "false"
      CORS_ORIGINS_STR: "http://localhost,http://localhost:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: belediye_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
