services:
  db:
    image: postgres:15-alpine
    container_name: belediye_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belediye_ihbar
    ports:
      - "5433:5432"
    volumes:  
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:  ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend: 
    build: .
    container_name: belediye_backend
    restart: always
    ports:
      - "8001:8001"
    environment: 
      DATABASE_URL: postgresql://postgres:postgres@db:5432/belediye_ihbar
      SECRET_KEY: super-secret-key-change-in-production-min-32-chars
      JWT_SECRET_KEY: super-secret-key-12345
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

volumes:  
  postgres_data: 